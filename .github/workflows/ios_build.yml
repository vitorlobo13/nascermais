name: iOS Build (Verificação)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-ios:
    name: Build iOS (sem assinatura)
    runs-on: macos-latest

    steps:
      # 1. Baixa o código do repositório (incluindo a pasta ios/)
      - name: Checkout do repositório
        uses: actions/checkout@v4

      # 2. Configura o Flutter
      - name: Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # 3. Instala as dependências do Flutter
      - name: Instalar dependências Flutter
        run: flutter pub get

      # 4. Instala as dependências nativas iOS via CocoaPods
      - name: Instalar CocoaPods
        run: |
          cd ios
          pod install --repo-update

      # 5. Verifica se há erros no código Dart/Flutter
      - name: Analisar código Flutter
        run: flutter analyze --no-fatal-infos

      # 6. Compila o app iOS SEM assinatura (apenas verifica se tudo compila)
      - name: Build iOS (sem assinatura de código)
        run: flutter build ios --release --no-codesign

      # 7. Salva o resultado como artefato para download
      - name: Salvar artefato iOS
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-${{ github.run_number }}
          path: build/ios/iphoneos/Runner.app
          retention-days: 7
