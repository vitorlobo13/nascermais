name: iOS Build (Verificação)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-ios:
    name: Build iOS (sem assinatura)
    runs-on: macos-latest

    steps:
      # 1. Baixa o código do repositório
      - name: Checkout do repositório
        uses: actions/checkout@v4

      # 2. Configura o Flutter
      - name: Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # 3. Cria um projeto temporário apenas para obter a pasta ios/ com o Podfile.
      #    Estratégia mais confiável: flutter create em pasta nova nunca falha.
      - name: Gerar estrutura iOS nativa (via projeto temporário)
        run: |
          flutter create /tmp/ios_scaffold \
            --platforms=ios \
            --org com.nascermais \
            --project-name nascer_mais
          cp -r /tmp/ios_scaffold/ios ./ios

      # 4. Instala as dependências do Flutter
      #    (gera o .flutter-plugins-dependencies que o Podfile precisa)
      - name: Instalar dependências Flutter
        run: flutter pub get

      # 5. Instala as dependências nativas iOS via CocoaPods
      - name: Instalar CocoaPods
        run: |
          cd ios
          pod install --repo-update
        
      # 6. Verifica se há erros no código Dart/Flutter
      - name: Analisar código Flutter
        run: flutter analyze --no-fatal-infos

      # 7. Compila o app iOS SEM assinatura (apenas verifica se tudo compila)
      - name: Build iOS (sem assinatura de código)
        run: flutter build ios --release --no-codesign

      # 8. Salva o resultado como artefato para download
      - name: Salvar artefato iOS
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-${{ github.run_number }}
          path: build/ios/iphoneos/Runner.app
          retention-days: 7
