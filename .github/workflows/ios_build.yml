name: iOS Build (Verificação)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-ios:
    name: Build iOS (sem assinatura)
    runs-on: macos-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Instalar dependências Flutter
        run: flutter pub get

      - name: Instalar CocoaPods
        run: |
          cd ios
          pod install --repo-update

      - name: Analisar código Flutter
        run: flutter analyze lib/ --no-fatal-infos

      - name: Build iOS (sem assinatura de código)
        run: flutter build ios --release --no-codesign

      # Empacota o .app dentro de Payload/ e gera o .ipa manualmente
      - name: Empacotar .ipa manualmente
        run: |
          mkdir -p /tmp/Payload
          cp -r build/ios/iphoneos/Runner.app /tmp/Payload/Runner.app
          cd /tmp
          zip -r Runner.ipa Payload/
          mv /tmp/Runner.ipa $GITHUB_WORKSPACE/Runner.ipa

      - name: Salvar artefato .ipa
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-${{ github.run_number }}
          path: Runner.ipa
          retention-days: 7
